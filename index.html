<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #B4E7FF 0%, #FFF9C4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .puzzle-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            width: 300px;
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .tile {
            width: 100%;
            height: 100%;
            background-size: 300px 300px;
            background-position: 0 0;
            border: none;
            outline: none;
            cursor: pointer;
            transition: all 0.1s ease;
            padding: 0;
            margin: 0;
            image-rendering: crisp-edges;
            background-repeat: no-repeat;
        }

        .tile:hover:not(.empty) {
            filter: brightness(1.1);
        }

        .tile:active:not(.empty) {
            filter: brightness(0.95);
        }

        .tile:focus {
            outline: none;
        }

        .tile.empty {
            background: linear-gradient(135deg, #B4E7FF, #FFF9C4);
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            outline: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .shuffle-btn {
            background: linear-gradient(135deg, #5B9BD5, #4A7FB8);
            color: white;
        }

        .shuffle-btn:hover {
            transform: translateY(-1px);
        }

        .reset-btn {
            background: linear-gradient(135deg, #FFB900, #FF9800);
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-1px);
        }

        .stats {
            display: flex;
            gap: 30px;
            color: #5B9BD5;
            font-weight: 600;
            font-size: 14px;
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFB900, #FF69B4);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(255, 185, 0, 0.4);
            text-align: center;
            z-index: 1000;
            max-width: 400px;
        }

        .win-message.show {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .win-message h2 {
            color: white;
            font-size: 48px;
            margin-bottom: 16px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .win-message p {
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .puzzle-container {
                width: 280px;
                height: 280px;
            }

            .tile {
                background-size: 280px 280px !important;
            }

            button {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <div class="stats">
        <div>Moves: <span id="moveCount">0</span></div>
        <div>Time: <span id="timeCount">0:00</span></div>
    </div>

    <div class="puzzle-container" id="puzzleContainer"></div>

    <div class="controls">
        <button class="shuffle-btn" onclick="shuffle()">Shuffle</button>
        <button class="reset-btn" onclick="reset()">Reset</button>
    </div>

    <div class="win-message" id="winMessage">
        <h2>✨ You Did It! ✨</h2>
        <p id="finalMoves">Moves: 0 | Time: 0:00</p>
    </div>

    <script>
        const GRID_SIZE = 3;
        const TILE_SIZE = 100;
        let tiles = [];
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let isWon = false;

        function init() {
            tiles = Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => i);
            moves = 0;
            seconds = 0;
            isWon = false;
            document.getElementById('moveCount').textContent = '0';
            document.getElementById('timeCount').textContent = '0:00';
            document.getElementById('winMessage').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
            renderPuzzle();
            if (timerInterval) clearInterval(timerInterval);
        }

        function renderPuzzle() {
            const container = document.getElementById('puzzleContainer');
            container.innerHTML = '';

            tiles.forEach((tileNumber, index) => {
                const tile = document.createElement('button');
                tile.className = tileNumber === 0 ? 'tile empty' : 'tile';
                
                if (tileNumber !== 0) {
                    const col = tileNumber % GRID_SIZE;
                    const row = Math.floor(tileNumber / GRID_SIZE);
                    tile.style.backgroundPosition = `${-col * TILE_SIZE}px ${-row * TILE_SIZE}px`;
                    tile.style.backgroundImage = 'url(puzzle.jpg)';
                }
                
                tile.onclick = () => moveTile(index);
                container.appendChild(tile);
            });
        }

        function getEmptyIndex() {
            return tiles.indexOf(0);
        }

        function canMove(index) {
            const emptyIndex = getEmptyIndex();
            const emptyRow = Math.floor(emptyIndex / GRID_SIZE);
            const emptyCol = emptyIndex % GRID_SIZE;
            const tileRow = Math.floor(index / GRID_SIZE);
            const tileCol = index % GRID_SIZE;

            return (
                (emptyRow === tileRow && Math.abs(emptyCol - tileCol) === 1) ||
                (emptyCol === tileCol && Math.abs(emptyRow - tileRow) === 1)
            );
        }

        function moveTile(index) {
            if (isWon || !canMove(index)) return;

            if (moves === 0) startTimer();

            const emptyIndex = getEmptyIndex();
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            moves++;
            document.getElementById('moveCount').textContent = moves;
            renderPuzzle();
            checkWin();
        }

        function checkWin() {
            const isWinState = tiles.every((tile, index) => tile === index);
            if (isWinState) {
                isWon = true;
                stopTimer();
                showWinMessage();
            }
        }

        function showWinMessage() {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('finalMoves').textContent = 
                `Moves: ${moves} | Time: ${mins}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('winMessage').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('timeCount').textContent = 
                    `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / GRID_SIZE);
            const col = index % GRID_SIZE;
            
            if (row > 0) neighbors.push(index - GRID_SIZE);
            if (row < GRID_SIZE - 1) neighbors.push(index + GRID_SIZE);
            if (col > 0) neighbors.push(index - 1);
            if (col < GRID_SIZE - 1) neighbors.push(index + 1);
            
            return neighbors;
        }

        function shuffleTiles() {
            let emptyPos = 0;
            for (let i = 0; i < 100; i++) {
                const neighbors = getNeighbors(emptyPos);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyPos], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyPos]];
                emptyPos = randomNeighbor;
            }
            renderPuzzle();
        }

        function shuffle() {
            stopTimer();
            shuffleTiles();
            moves = 0;
            seconds = 0;
            isWon = false;
            document.getElementById('moveCount').textContent = '0';
            document.getElementById('timeCount').textContent = '0:00';
            document.getElementById('winMessage').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        function reset() {
            stopTimer();
            init();
        }

        init();
        shuffleTiles();
    </script>
</body>
</html>
